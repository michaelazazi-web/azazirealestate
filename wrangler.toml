# Cloudflare Pages + Workers configuration
# Docs: https://developers.cloudflare.com/pages/platform/wrangler-configuration/

name = "azazirealestate"
compatibility_date = "2024-09-23"

# ── Pages build settings ───────────────────────────────────────────────────
[env.production]
# These match what you set in the Cloudflare Dashboard
# Never commit real secrets here — use `wrangler pages secret put <KEY>`

# ── Optional: Cloudflare KV for lead storage ──────────────────────────────
# If you want queryable lead storage in production, uncomment and create
# the KV namespace with: wrangler kv:namespace create LEADS
#
# [[kv_namespaces]]
# binding = "LEADS"
# id = "your_kv_namespace_id_here"

# ── Optional: Cloudflare D1 SQLite database ────────────────────────────────
# For a full database, uncomment and create with: wrangler d1 create leads-db
#
# [[d1_databases]]
# binding = "DB"
# database_name = "leads-db"
# database_id = "your_d1_database_id_here"
